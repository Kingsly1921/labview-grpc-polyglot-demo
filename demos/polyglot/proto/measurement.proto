
syntax = "proto3";
package polyglot.measure;

service MeasurementService {
  rpc StartAcquisition (StartRequest) returns (StartReply);                 // Unary
  rpc StreamMeasurements (StreamRequest) returns (stream Measurement);      // Server streaming
}

message StartRequest { string session_id = 1; }
message StartReply   { bool ok = 1; string message = 2; }

message StreamRequest { string session_id = 1; int32 rate_hz = 2; }
message Measurement   { int64 t_ticks = 1; double value = 2; }

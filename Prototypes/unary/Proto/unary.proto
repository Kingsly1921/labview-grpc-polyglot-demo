syntax = "proto3";

option java_multiple_files = true;
option java_package = "labview.Communication";
option java_outer_classname = "Comm";
option objc_class_prefix = "HLW";
package Communication;

service Communicate
{
rpc Transmission(ActionRequest) returns (ActionReply) {}
}
message ActionRequest
{
string Request=1;
string Data=2;
}
message ActionReply
{
string Reply=1;
string Status=2;
}